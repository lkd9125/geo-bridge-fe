<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="bridgeGradStatic" x1="0%" y1="100%" x2="100%" y2="0%">
                            <stop offset="0%" stop-color="#00E5FF"></stop>
                            <stop offset="100%" stop-color="#8A2BE2"></stop>
                        </linearGradient>
                        <linearGradient id="pinGradStatic" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" stop-color="#8A2BE2"></stop>
                            <stop offset="100%" stop-color="#4A00E0"></stop>
