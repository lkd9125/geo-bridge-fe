                    <!-- Static Data Packets -->
                    <circle cx="205" cy="205" r="8" fill="#FFFFFF"></circle>
                    <circle cx="280" cy="148" r="8" fill="#FFFFFF"></circle>
                    <circle cx="360" cy="155" r="8" fill="#FFFFFF"></circle>

                    <!-- End Node (Client Map Pin) -->
