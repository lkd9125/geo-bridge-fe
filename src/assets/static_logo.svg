<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
    <!-- 1. Back Orbit Layer -->
    <g transform="rotate(-15 256 280)">
        <path d="M 56 280 A 200 60 0 0 0 456 280" stroke="#FFFFFF" stroke-width="10"
            stroke-dasharray="12 20" fill="none" opacity="0.15"></path>
    </g>

    <!-- 2. Globe Base (Solid background to occlude back orbit) -->
    <g stroke="#FFFFFF" stroke-width="12" fill="none" stroke-linecap="round">
        <!-- Solid dark fill -->
        <circle cx="256" cy="280" r="130" fill="#1a1c29" stroke="none"></circle>
        <circle cx="256" cy="280" r="130" opacity="0.3"></circle>

        <!-- Grids -->
        <path d="M 148 205 Q 256 250 364 205" opacity="0.3"></path>
        <path d="M 126 280 Q 256 340 386 280" opacity="0.3"></path>
        <path d="M 164 372 Q 256 410 348 372" opacity="0.3"></path>
        <path d="M 256 150 L 256 410" opacity="0.3"></path>
        <path d="M 256 150 Q 170 280 256 410" opacity="0.3"></path>
        <path d="M 256 150 Q 342 280 256 410" opacity="0.3"></path>
    </g>

    <!-- 3. Front Orbit Layer -->
    <g transform="rotate(-15 256 280)">
        <path d="M 56 280 A 200 60 0 0 1 456 280" stroke="#FFFFFF" stroke-width="16"
            stroke-dasharray="16 24" stroke-linecap="round" fill="none" opacity="0.9"></path>
        <circle cx="115" cy="322" r="12" fill="#FFFFFF"></circle>
        <circle cx="397" cy="322" r="8" fill="#FFFFFF"></circle>
    </g>

    <!-- 4. Marker -->
    <g transform="translate(10, 0)">
        <path
            d="M 280 145 A 40 40 0 1 1 360 145 C 360 175, 320 220, 320 220 C 320 220, 280 175, 280 145 Z"
            fill="#FFFFFF"></path>
        <circle cx="320" cy="145" r="12" fill="#1a1c29"></circle>
    </g>
</svg>