<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#8B5CF6"></stop>
            <stop offset="100%" stop-color="#6D28D9"></stop>
        </linearGradient>
        <linearGradient id="routeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#06B6D4"></stop>
            <stop offset="100%" stop-color="#7C3AED"></stop>
        </linearGradient>
    </defs>

    <!-- Base Shadow -->
    <ellipse cx="256" cy="440" rx="100" ry="16" fill="#EDE9FE"></ellipse>

    <!-- 1. Back Orbit Layer (Hidden behind the globe) -->
    <g transform="rotate(-15 256 280)">
        <!-- sweep-flag 0 draws the top/back half of the ellipse -->
        <path d="M 56 280 A 200 60 0 0 0 456 280" stroke="url(#routeGrad)" stroke-width="12" stroke-dasharray="12 20" fill="none" opacity="0.3"></path>
    </g>

    <!-- 2. Globe Base (Opaque fill physically hides the back orbit) -->
    <g stroke="#06B6D4" stroke-width="12" fill="none" stroke-linecap="round">
        <!-- Solid fill to create 3D occlusion -->
        <circle cx="256" cy="280" r="130" fill="#F8FAFC"></circle>
        
        <!-- Latitudes (Horizontal Grids) -->
        <path d="M 148 205 Q 256 250 364 205" opacity="0.6"></path>
        <path d="M 126 280 Q 256 340 386 280" opacity="0.6"></path>
        <path d="M 164 372 Q 256 410 348 372" opacity="0.6"></path>
        
        <!-- Longitudes (Vertical Grids) -->
        <path d="M 256 150 L 256 410" opacity="0.6"></path>
        <path d="M 256 150 Q 170 280 256 410" opacity="0.6"></path>
        <path d="M 256 150 Q 342 280 256 410" opacity="0.6"></path>
    </g>

    <!-- 3. Front Orbit Layer (Drawn over the globe) -->
    <g transform="rotate(-15 256 280)">
        <!-- sweep-flag 1 draws the bottom/front half of the ellipse -->
        <path d="M 56 280 A 200 60 0 0 1 456 280" stroke="url(#routeGrad)" stroke-width="16" stroke-dasharray="16 24" stroke-linecap="round" fill="none"></path>
        
        <!-- Data Packets riding the front orbit -->
        <circle cx="115" cy="322" r="12" fill="#06B6D4"></circle>
        <circle cx="397" cy="322" r="8" fill="#8B5CF6"></circle>
    </g>

    <!-- 4. The Marker (Map Pin) landing on the Globe -->
    <g transform="translate(10, 0)">
        <path d="M 280 145 A 40 40 0 1 1 360 145 C 360 175, 320 220, 320 220 C 320 220, 280 175, 280 145 Z" fill="url(#mainGrad)"></path>
        <circle cx="320" cy="145" r="16" fill="#FFFFFF"></circle>
        <!-- Marker Glow/Drop point -->
        <ellipse cx="320" cy="220" rx="12" ry="4" fill="#6D28D9" opacity="0.4"></ellipse>
    </g>
</svg>