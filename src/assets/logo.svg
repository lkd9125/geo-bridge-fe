<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="bridgeGrad" x1="0%" y1="100%" x2="100%" y2="0%">
                            <stop offset="0%" stop-color="#00E5FF"></stop>
                            <stop offset="100%" stop-color="#8A2BE2"></stop>
                        </linearGradient>
                        <linearGradient id="pinGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" stop-color="#8A2BE2"></stop>
                            <stop offset="100%" stop-color="#4A00E0"></stop>
                        </linearGradient>
                        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                            <feGaussianBlur stdDeviation="6" result="blur"></feGaussianBlur>
                            <feComposite in="SourceGraphic" in2="blur" operator="over"></feComposite>
                        </filter>
                        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
                            <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000" flood-opacity="0.5"></feDropShadow>
                        </filter>
                    </defs>

                    <!-- Background Base Shadows -->
                    <ellipse cx="120" cy="420" rx="36" ry="12" fill="rgba(0,0,0,0.3)" filter="url(#glow)"></ellipse>
                    <ellipse cx="400" cy="420" rx="24" ry="8" fill="rgba(0,0,0,0.3)" filter="url(#glow)"></ellipse>

                    <!-- Start Node (Simulator) -->
                    <g transform="translate(0, 10)">
                        <!-- Radar Waves -->
                        <circle cx="120" cy="380" r="72" stroke="#00E5FF" stroke-width="2" fill="none" opacity="0.3" stroke-dasharray="6 6">
                            <animateTransform attributeName="transform" type="rotate" from="0 120 380" to="360 120 380" dur="10s" repeatCount="indefinite"></animateTransform>
                        </circle>
                        <circle cx="120" cy="380" r="48" stroke="#00E5FF" stroke-width="4" fill="none" opacity="0.5"></circle>
                        <!-- Core Coordinate -->
                        <circle cx="120" cy="380" r="20" fill="#00E5FF" filter="url(#glow)"></circle>
                        <!-- Crosshair -->
                        <path d="M 120 340 L 120 355 M 120 405 L 120 420 M 80 380 L 95 380 M 145 380 L 160 380" stroke="#00E5FF" stroke-width="4" stroke-linecap="round"></path>
                    </g>

                    <!-- The Bridge (Data Arc) -->
                    <path d="M 120 390 C 120 100, 300 100, 400 210" stroke="url(#bridgeGrad)" stroke-width="20" stroke-linecap="round" fill="none" filter="url(#shadow)"></path>

                    <!-- Animated Data Packets -->
                    <circle r="6" fill="#FFFFFF" filter="url(#glow)">
                        <animateMotion dur="2s" repeatCount="indefinite" path="M 120 390 C 120 100, 300 100, 400 210"></animateMotion>
                    </circle>
                    <circle r="6" fill="#FFFFFF" filter="url(#glow)">
                        <animateMotion dur="2s" begin="0.66s" repeatCount="indefinite" path="M 120 390 C 120 100, 300 100, 400 210"></animateMotion>
                    </circle>
                    <circle r="6" fill="#FFFFFF" filter="url(#glow)">
                        <animateMotion dur="2s" begin="1.33s" repeatCount="indefinite" path="M 120 390 C 120 100, 300 100, 400 210"></animateMotion>
                    </circle>

                    <!-- End Node (Client Map Pin) -->
                    <g filter="url(#shadow)" transform="translate(0, 10)">
                        <path d="M 336 200 A 64 64 0 1 1 464 200 C 464 280, 400 400, 400 400 C 400 400, 336 280, 336 200 Z" fill="url(#pinGrad)"></path>
                        <!-- Pin Hole (Data enters here) -->
                        <circle cx="400" cy="200" r="24" fill="#111827"></circle>
                        <!-- Pulse inside pin -->
                        <circle cx="400" cy="200" r="12" fill="#00E5FF" filter="url(#glow)">
                            <animate attributeName="opacity" values="0.2;1;0.2" dur="2s" repeatCount="indefinite"></animate>
                        </circle>
                    </g>
                </svg>